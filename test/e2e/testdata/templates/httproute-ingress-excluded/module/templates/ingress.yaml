apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: e2e-app
  namespace: e2e-httproute-ingress-excluded
  labels:
    app: e2e-app
spec:
  rules:
    - host: e2e.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: e2e-svc
                port:
                  number: 80
