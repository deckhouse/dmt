{{- $moduleGateway := dict "name" "test-gateway" }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gateway-cert
  namespace: e2e-certificate-gateway-issuer-disabled
spec:
  secretName: gateway-cert-tls
  issuerRef:
    name: {{ printf "letsencrypt-gateway-%s" $moduleGateway.name }}
    kind: ClusterIssuer
  dnsNames:
  - example.com
