description: >
  A rendered DaemonSet with a container whose resources block sets `memory`
  directly (instead of resources.limits/requests.memory) must be flagged by the
  templates schema-validation rule. This is the same undeclared-field error that
  Kubernetes server-side apply reports as "field not declared in schema".
module: module
expect:
  - linter: templates
    rule: schema-validation
    level: error
    textContains: "additional properties 'memory' not allowed"
