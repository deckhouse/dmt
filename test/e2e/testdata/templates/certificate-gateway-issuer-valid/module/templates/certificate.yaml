apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gateway-cert
  namespace: e2e-certificate-gateway-issuer-valid
spec:
  secretName: gateway-cert-tls
  issuerRef:
    name: {{ include "helm_lib_module_https_cert_manager_cluster_issuer_name_for_gateway_api" . }}
    kind: ClusterIssuer
  dnsNames:
  - example.com
