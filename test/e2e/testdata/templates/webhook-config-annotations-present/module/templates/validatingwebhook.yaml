apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: e2e-webhook-present
  annotations:
    werf.io/weight: "10"
webhooks:
  - name: check.example.com
    clientConfig:
      service:
        name: my-service
        namespace: e2e-webhook-present
      caBundle: Cg==
    admissionReviewVersions: ["v1"]
    sideEffects: None
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
