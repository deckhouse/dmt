# registry secret derived from .Values.global.modulesImages.registry.dockercfg
# (intentionally missing the module-specific .Values.<module>.registry.dockercfg override)
apiVersion: v1
kind: Secret
metadata:
  name: e2e-registry
  namespace: e2e-registry
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: e30=
