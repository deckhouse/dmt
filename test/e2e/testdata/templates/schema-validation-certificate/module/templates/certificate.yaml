apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: e2e-cert
  namespace: e2e-schema-certificate
spec:
  secretName: e2e-cert-tls
  # dnsNames must be an array of strings; a scalar string is a schema violation
  # that the bundled cert-manager Certificate CRD schema (datree catalog) catches.
  dnsNames: example.com
  issuerRef:
    name: e2e-issuer
    kind: ClusterIssuer
    group: cert-manager.io
