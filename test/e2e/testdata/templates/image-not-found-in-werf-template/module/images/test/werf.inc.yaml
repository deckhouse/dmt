---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-artifact
final: false
fromImage: nginx:latest
---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}
fromImage: scratch
import:
- image: {{ .ModuleNamePrefix }}{{ .ImageName }}-artifact
  add: /index.html
  to: /index.html
  before: setup
imageSpec:
  config:
    entrypoint: ["/bin/sh"]
