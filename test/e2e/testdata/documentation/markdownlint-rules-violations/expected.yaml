  reports every rule it has enabled. Assertions are scoped to the documentation
  linter's markdownlint rule; findings from other linters are ignored.
  Not asserted because go-markdownlint v0.0.5 emits no finding for the
  documented violation (fixture kept for when the engine starts reporting it): MD028.
