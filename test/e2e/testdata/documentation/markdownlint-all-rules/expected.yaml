description: >-
  A module whose docs/ intentionally violate every markdownlint rule that is
  active under dmt's configuration, spread across one file per rule cluster to
  avoid style-consistency rules masking each other. Each active rule must be
  reported at least once. This verifies the full markdownlint ruleset actually
  detects the errors it is supposed to.
#
# MD036 (no-emphasis-as-heading) and MD051 (link-fragments) were fixed in
# go-markdownlint (they used to silently never fire); they are asserted below.
#
# Rules that are active but deliberately NOT asserted here:
#   MD054 (link-image-style) - default config allows every link/image style, so
#                              it cannot produce a finding.
#
# Rules disabled via dmt config (must stay silent): MD002, MD004, MD032, MD033,
# MD053, MD059, MD060.
expect:
  - linter: documentation
    rule: markdownlint
    textContains: "MD001/"
  - linter: documentation
    rule: markdownlint
    textContains: "MD003/"
  - linter: documentation
    rule: markdownlint
    textContains: "MD005/"
  - linter: documentation
    rule: markdownlint
    textContains: "MD009/"
  - linter: documentation
    rule: markdownlint
    textContains: "MD010/"
