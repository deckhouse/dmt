description: >
  A module that uses disable.messages without pinning requirements.deckhouse to
  >= v1.77 must be flagged as an error, because Deckhouse below v1.77 does not
  understand the localized disable.messages field.
module: module
expect:
  - linter: module
    rule: definition-file
    level: error
    textContains: "disable.messages' is only supported on Deckhouse >= v1.77"
