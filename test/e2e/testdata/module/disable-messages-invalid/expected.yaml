description: >
  A module that sets disable.messages with only one language (en, no ru) and
  without requirements.deckhouse >= 1.77 must be flagged with both errors: the
  version requirement and the missing localization.
module: module
expect:
  - linter: module
    rule: definition-file
    level: error
    textContains: "is only supported on Deckhouse >= v1.77"
  - linter: module
    rule: definition-file
    level: error
    textContains: "must define both 'ru' and 'en'"
